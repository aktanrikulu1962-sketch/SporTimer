<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#111111" />
<title>Spor Zamanlayıcı</title>
<style>
  :root{
    --bg:#111111; --panel:#1c1c1e; --text:#f5f5f7; --muted:#b0b0b5;
    --accent:#34c759; --danger:#ff3b30; --secondary:#2c2c2e; --border:#3a3a3c;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh;
    display:flex; align-items:center; justify-content:center;
  }
  .app{
    width:min(680px, 100vw); min-height:100vh; padding:20px 16px 28px;
    display:flex; flex-direction:column; gap:16px; justify-content:center;
  }
  .card{
    background:var(--panel); border:1px solid var(--border); border-radius:20px;
    padding:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
  }
  h1{margin:0 0 6px; font-size:28px; text-align:center;}
  .sub{color:var(--muted); text-align:center; font-size:14px;}
  .phase{
    text-align:center; font-size:22px; font-weight:700; margin-bottom:8px;
    min-height:28px;
  }
  .timer{
    text-align:center; font-size:72px; font-weight:800; letter-spacing:1px;
    margin:6px 0 4px;
  }
  .setline{
    text-align:center; color:var(--muted); font-size:18px;
  }
  .grid{
    display:grid; grid-template-columns:repeat(4, 1fr); gap:10px;
  }
  button{
    border:none; border-radius:16px; padding:14px 12px; font-size:18px; font-weight:700;
    cursor:pointer;
  }
  .opt{
    background:var(--secondary); color:var(--text); border:1px solid var(--border);
  }
  .opt.active{
    outline:3px solid rgba(52,199,89,.25); background:#17331f; border-color:#2d6d3f;
  }
  .controls{
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
  }
  .start{background:var(--accent); color:#08120a;}
  .stop{background:var(--danger); color:white;}
  .small{
    display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;
    align-items:center;
  }
  .toggle{
    background:var(--secondary); color:var(--text); border:1px solid var(--border);
    font-size:15px; padding:12px 10px;
  }
  .toggle.active{
    background:#253347; border-color:#4f78a1;
  }
  .info{font-size:14px; color:var(--muted); line-height:1.45;}
  .footer{text-align:center; color:var(--muted); font-size:13px;}
  .count-wrap{
    display:flex; align-items:center; justify-content:center; gap:10px; margin-top:8px;
  }
  .count-btn{
    width:54px; font-size:26px; padding:10px 0; background:var(--secondary); color:var(--text);
    border:1px solid var(--border);
  }
  .count-display{
    min-width:120px; text-align:center; font-size:28px; font-weight:800;
  }
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <h1>Spor Zamanlayıcı</h1>
    <div class="sub">iPhone Safari'de çalışır. İstersen sonra Ana Ekran'a ekleyebilirsin.</div>
  </div>

  <div class="card">
    <div class="phase" id="phase">Hazır</div>
    <div class="timer" id="timer">00:45</div>
    <div class="setline" id="setline">Tur 1 / 13</div>
  </div>

  <div class="card">
    <div class="sub" style="margin-bottom:10px;">Çalışma süresi</div>
    <div class="grid">
      <button class="opt" data-work="30">30 sn</button>
      <button class="opt active" data-work="45">45 sn</button>
      <button class="opt" data-work="60">60 sn</button>
      <button class="opt" data-work="120">120 sn</button>
    </div>
  </div>

  <div class="card">
    <div class="sub">Tur sayısı</div>
    <div class="count-wrap">
      <button class="count-btn" id="minusSet">−</button>
      <div class="count-display" id="setCountDisplay">13</div>
      <button class="count-btn" id="plusSet">+</button>
    </div>
  </div>

  <div class="card">
    <div class="small">
      <button class="toggle active" id="tickToggle">Tik-tak açık</button>
      <button class="toggle active" id="voiceToggle">Sesli bildirim açık</button>
      <button class="toggle active" id="screenToggle">Ekranı açık tut</button>
    </div>
    <div class="info" style="margin-top:12px;">
      Başlat tuşu ile başlayabilirsin.
    </div>
  </div>

  <div class="card">
    <div class="controls">
      <button class="start" id="startBtn">Başlat</button>
      <button class="stop" id="stopBtn">Durdur</button>
    </div>
  </div>

  <div class="footer">Not: iPhone'da ses üretimi için ilk başlatma kullanıcı dokunuşuyla yapılmalıdır.</div>
</div>

<script>
(() => {
  let totalSets = 13;
  let workSec = 45;
  let restSec = 7;
  let currentSet = 1;
  let phase = 'ready';
  let remaining = workSec;
  let running = false;
  let timeoutId = null;
  let tickEnabled = true;
  let voiceEnabled = true;
  let wakeLockEnabled = true;
  let wakeLock = null;
  let audioCtx = null;

  const phaseEl = document.getElementById('phase');
  const timerEl = document.getElementById('timer');
  const setlineEl = document.getElementById('setline');
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const tickToggle = document.getElementById('tickToggle');
  const voiceToggle = document.getElementById('voiceToggle');
  const screenToggle = document.getElementById('screenToggle');
  const optButtons = [...document.querySelectorAll('.opt')];
  const minusSet = document.getElementById('minusSet');
  const plusSet = document.getElementById('plusSet');
  const setCountDisplay = document.getElementById('setCountDisplay');

  function fmt(sec){
    const m = Math.floor(sec/60).toString().padStart(2, '0');
    const s = (sec%60).toString().padStart(2, '0');
    return `${m}:${s}`;
  }

  function updateDisplay() {
    timerEl.textContent = fmt(remaining);
    setlineEl.textContent = (phase === 'done' || phase === 'stopped')
      ? `Toplam ${totalSets} tur`
      : `Tur ${currentSet} / ${totalSets}`;
    const labels = {
      ready: 'Hazır',
      prestart: 'Hazırlan',
      work: 'Çalış',
      rest: 'Dinlen',
      done: 'Tamamlandı',
      stopped: 'Durduruldu'
    };
    phaseEl.textContent = labels[phase] || 'Hazır';
    setCountDisplay.textContent = String(totalSets);
  }

  function setWork(newWork) {
    workSec = newWork;
    restSec = (newWork === 120) ? 10 : 5;
    if (!running) {
      phase = 'ready';
      currentSet = 1;
      remaining = workSec;
      updateDisplay();
    }
    optButtons.forEach(btn => btn.classList.toggle('active', Number(btn.dataset.work) === newWork));
  }

  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  function tone(freq=880, duration=0.12, type='sine', gainValue=0.08, attack=0.01) {
    try{
      ensureAudio();
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(gainValue, now + attack);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + duration + 0.03);
    } catch(e){}
  }

  function gong() {
    tone(520, 1.0, 'sine', 0.09, 0.02);
    setTimeout(() => tone(390, 1.2, 'triangle', 0.07, 0.03), 40);
  }

  function tickSound() {
    tone(1400, 0.03, 'square', 0.03, 0.005);
  }

  function restPulse() {
    tone(600, 0.06, 'triangle', 0.05, 0.005);
  }

  function speak(text){
    if (!voiceEnabled || !('speechSynthesis' in window)) return;
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'tr-TR';
      u.rate = 1.0;
      u.pitch = 1.0;
      window.speechSynthesis.speak(u);
    } catch(e){}
  }

  async function requestWakeLock() {
    if (!wakeLockEnabled) return;
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
      }
    } catch(e){}
  }

  async function releaseWakeLock() {
    try {
      if (wakeLock) {
        await wakeLock.release();
        wakeLock = null;
      }
    } catch(e){}
  }

  function clearTimer() {
    if (timeoutId) {
      clearTimeout(timeoutId);
      timeoutId = null;
    }
  }

  function resetState(stopped=false) {
    clearTimer();
    running = false;
    currentSet = 1;
    phase = stopped ? 'stopped' : 'ready';
    remaining = workSec;
    updateDisplay();
    releaseWakeLock();
  }

  function stopNow() {
    resetState(true);
    speak('Durduruldu');
  }

  function doneAll() {
    clearTimer();
    running = false;
    phase = 'done';
    remaining = 0;
    updateDisplay();
    gong();
    speak('Set tamamlandı');
    releaseWakeLock();
  }

  function enterRest() {
    phase = 'rest';
    remaining = restSec;
    updateDisplay();
    gong();
    speak('Dinlen');
    loop();
  }

  function enterNextWorkOrDone() {
    if (currentSet >= totalSets) {
      doneAll();
      return;
    }
    currentSet += 1;
    phase = 'work';
    remaining = workSec;
    updateDisplay();
    gong();
    speak('Başla');
    loop();
  }

  function loop() {
    clearTimer();
    if (!running) return;

    timeoutId = setTimeout(() => {
      if (!running) return;

      remaining -= 1;

      if (phase === 'work' && remaining > 0 && tickEnabled) {
        tickSound();
      }
      if (phase === 'rest' && remaining > 0) {
        restPulse();
      }

      updateDisplay();

      if (remaining <= 0) {
        if (phase === 'prestart') {
          phase = 'work';
          currentSet = 1;
          remaining = workSec;
          updateDisplay();
          gong();
          speak('Başla');
          loop();
        } else if (phase === 'work') {
          enterRest();
        } else if (phase === 'rest') {
          enterNextWorkOrDone();
        }
      } else {
        loop();
      }
    }, 1000);
  }

  async function startNow() {
    ensureAudio();
    await requestWakeLock();
    clearTimer();
    running = true;
    currentSet = 1;
    phase = 'prestart';
    remaining = 5;
    updateDisplay();
    speak('Birkaç saniye sonra başlıyoruz');
    loop();
  }

  optButtons.forEach(btn => btn.addEventListener('click', () => {
    setWork(Number(btn.dataset.work));
  }));

  tickToggle.addEventListener('click', () => {
    tickEnabled = !tickEnabled;
    tickToggle.classList.toggle('active', tickEnabled);
    tickToggle.textContent = tickEnabled ? 'Tik-tak açık' : 'Tik-tak kapalı';
  });

  voiceToggle.addEventListener('click', () => {
    voiceEnabled = !voiceEnabled;
    voiceToggle.classList.toggle('active', voiceEnabled);
    voiceToggle.textContent = voiceEnabled ? 'Sesli bildirim açık' : 'Sesli bildirim kapalı';
  });

  screenToggle.addEventListener('click', async () => {
    wakeLockEnabled = !wakeLockEnabled;
    screenToggle.classList.toggle('active', wakeLockEnabled);
    screenToggle.textContent = wakeLockEnabled ? 'Ekranı açık tut' : 'Ekran kilitlenebilir';
    if (!wakeLockEnabled) await releaseWakeLock();
    else if (running) await requestWakeLock();
  });

  minusSet.addEventListener('click', () => {
    if (running) return;
    totalSets = Math.max(1, totalSets - 1);
    updateDisplay();
  });

  plusSet.addEventListener('click', () => {
    if (running) return;
    totalSets = Math.min(99, totalSets + 1);
    updateDisplay();
  });

  startBtn.addEventListener('click', startNow);
  stopBtn.addEventListener('click', stopNow);

  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible' && running && wakeLockEnabled) {
      await requestWakeLock();
    }
  });

  setWork(45);
  updateDisplay();
})();
</script>
</body>
</html>
